name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('ft8cn/**/*.gradle*', 'ft8cn/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}--

      - name: Grant execute permission for gradlew
        run: chmod +x ft8cn/gradlew

      - name: Run unit tests
        working-directory: ft8cn
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Generate coverage report
        working-directory: ft8cn
        run: ./gradlew jacocoTestReport --stacktrace

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-coverage-report
          path: ft8cn/app/build/reports/jacoco/

      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: ft8cn/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-reports
          path: |
            ft8cn/app/build/reports/tests/
            ft8cn/app/build/test-results/
