name: Build & Release APK

on:
  push:
    branches: [main, Dev]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Unit tests (PR only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('ft8cn/**/*.gradle*', 'ft8cn/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}--

      - name: Grant execute permission for gradlew
        run: chmod +x ft8cn/gradlew

      - name: Run unit tests
        working-directory: ft8cn
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-reports
          path: |
            ft8cn/app/build/reports/tests/
            ft8cn/app/build/test-results/

  static-analysis:
    name: Static analysis (PR only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('ft8cn/**/*.gradle*', 'ft8cn/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}--

      - name: Grant execute permission for gradlew
        run: chmod +x ft8cn/gradlew

      - name: Run Android lint (warn only)
        continue-on-error: true
        working-directory: ft8cn
        run: ./gradlew lintDebug --stacktrace

      - name: Run detekt (warn only)
        continue-on-error: true
        working-directory: ft8cn
        run: ./gradlew detekt --stacktrace

      - name: Run ktlint (warn only)
        continue-on-error: true
        working-directory: ft8cn
        run: ./gradlew ktlintCheck --stacktrace

      - name: Upload static-analysis reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: static-analysis-reports
          if-no-files-found: ignore
          path: |
            ft8cn/app/build/reports/lint-results-debug.*
            ft8cn/app/build/reports/detekt/
            ft8cn/app/build/reports/ktlint/

  build:
    name: Build APK
    needs: test
    # Run when tests pass (PR), or when tests were skipped (push to main/Dev/tags).
    # Block only on actual test failure or cancellation.
    if: ${{ always() && needs.test.result != 'failure' && needs.test.result != 'cancelled' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Determine release tag
        id: tag
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Manual tag push — release as that tag
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            # Push to main — auto-bump patch from latest v* tag
            latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
            if [[ -z "$latest" ]]; then
              new_tag="v0.1"
            else
              version="${latest#v}"
              IFS='.' read -ra parts <<< "$version"
              last_idx=$((${#parts[@]} - 1))
              parts[$last_idx]=$((parts[$last_idx] + 1))
              new_tag="v$(IFS=.; echo "${parts[*]}")"
            fi
            echo "Latest tag: ${latest:-<none>} -> new tag: $new_tag"
            echo "release_tag=$new_tag" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            # PR or Dev push — build only, no release
            echo "release_tag=" >> "$GITHUB_OUTPUT"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('ft8cn/**/*.gradle*', 'ft8cn/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}--

      - name: Grant execute permission for gradlew
        run: chmod +x ft8cn/gradlew

      - name: Decode keystore (release builds only)
        if: steps.tag.outputs.should_release == 'true'
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"
          echo "RELEASE_STORE_FILE=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"

      - name: Build APK & AAB
        working-directory: ft8cn
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          args=(assembleRelease)
          # Sign + produce AAB only on release builds — PR builds stay unsigned
          # because the keystore secret isn't available (and shouldn't be) for
          # fork PRs.
          if [[ -n "${RELEASE_STORE_FILE:-}" ]]; then
            args+=(bundleRelease \
              "-PRELEASE_STORE_FILE=$RELEASE_STORE_FILE" \
              "-PRELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD" \
              "-PRELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS" \
              "-PRELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD")
          fi
          ./gradlew "${args[@]}"

      - name: Rename APK
        if: steps.tag.outputs.should_release == 'true'
        run: |
          set -euo pipefail
          cd ft8cn/app/build/outputs/apk/release
          # Signed builds emit app-release.apk; unsigned emit app-release-unsigned.apk.
          # Keep the fallback so the rename works either way.
          if [[ -f app-release.apk ]]; then
            src=app-release.apk
          elif [[ -f app-release-unsigned.apk ]]; then
            src=app-release-unsigned.apk
          else
            echo "::error::No release APK found in $(pwd):" >&2
            ls -la >&2
            exit 1
          fi
          mv "$src" "FT8CN-${{ steps.tag.outputs.release_tag }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: ft8cn-release
          path: ft8cn/app/build/outputs/apk/release/*.apk

      - name: Upload AAB artifact
        if: steps.tag.outputs.should_release == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ft8cn-release-aab
          path: ft8cn/app/build/outputs/bundle/release/*.aab

      - name: Create GitHub Release
        if: steps.tag.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          files: ft8cn/app/build/outputs/apk/release/FT8CN-*.apk
          generate_release_notes: true
          append_body: true
          body: |

            ---
            Vibecoded with spite on I-70 enroute to Dayton Hamvention.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish AAB to Play Internal track
        if: steps.tag.outputs.should_release == 'true' && github.event.repository.fork == false
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: radio.ks3ckc.ft8af
          releaseFiles: ft8cn/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          releaseName: ${{ steps.tag.outputs.release_tag }}
