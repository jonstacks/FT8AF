name: Build & Release APK

on:
  push:
    branches: [main, Dev]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Determine release tag
        id: tag
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Manual tag push — release as that tag
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            # Push to main — auto-bump patch from latest v* tag
            latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
            if [[ -z "$latest" ]]; then
              new_tag="v0.1"
            else
              version="${latest#v}"
              IFS='.' read -ra parts <<< "$version"
              last_idx=$((${#parts[@]} - 1))
              parts[$last_idx]=$((parts[$last_idx] + 1))
              new_tag="v$(IFS=.; echo "${parts[*]}")"
            fi
            echo "Latest tag: ${latest:-<none>} -> new tag: $new_tag"
            echo "release_tag=$new_tag" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            # PR or Dev push — build only, no release
            echo "release_tag=" >> "$GITHUB_OUTPUT"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('ft8cn/**/*.gradle*', 'ft8cn/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}--

      - name: Grant execute permission for gradlew
        run: chmod +x ft8cn/gradlew

      - name: Build APK
        working-directory: ft8cn
        run: ./gradlew assembleRelease

      - name: Rename APK
        if: steps.tag.outputs.should_release == 'true'
        run: |
          set -euo pipefail
          cd ft8cn/app/build/outputs/apk/release
          # No signing config is wired up (see app/build.gradle:46), so the
          # release task emits app-release-unsigned.apk. Handle either name so
          # adding RELEASE_STORE_FILE later will Just Work.
          if [[ -f app-release.apk ]]; then
            src=app-release.apk
          elif [[ -f app-release-unsigned.apk ]]; then
            src=app-release-unsigned.apk
          else
            echo "::error::No release APK found in $(pwd):" >&2
            ls -la >&2
            exit 1
          fi
          mv "$src" "FT8CN-${{ steps.tag.outputs.release_tag }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ft8cn-release
          path: ft8cn/app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        if: steps.tag.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          files: ft8cn/app/build/outputs/apk/release/FT8CN-*.apk
          generate_release_notes: true
          append_body: true
          body: |

            ---
            Vibecoded with spite on I-70 enroute to Dayton Hamvention.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
