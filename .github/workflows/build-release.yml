name: Build & Release APK

on:
  push:
    branches: [main, Dev]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Determine release tag
        id: tag
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Manual tag push — release as that tag
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            # Push to main — auto-bump patch from latest v* tag
            latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
            if [[ -z "$latest" ]]; then
              new_tag="v0.1"
            else
              version="${latest#v}"
              IFS='.' read -ra parts <<< "$version"
              last_idx=$((${#parts[@]} - 1))
              parts[$last_idx]=$((parts[$last_idx] + 1))
              new_tag="v$(IFS=.; echo "${parts[*]}")"
            fi
            echo "Latest tag: ${latest:-<none>} -> new tag: $new_tag"
            echo "release_tag=$new_tag" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            # PR or Dev push — build only, no release
            echo "release_tag=" >> "$GITHUB_OUTPUT"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('ft8cn/**/*.gradle*', 'ft8cn/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}--

      - name: Grant execute permission for gradlew
        run: chmod +x ft8cn/gradlew

      - name: Check release signing secrets
        id: release_secrets
        if: steps.tag.outputs.should_release == 'true'
        shell: bash
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          skip_release() {
            echo "::notice::$1; skipping GitHub release, tag creation, and Play publishing."
            echo "can_release=false" >> "$GITHUB_OUTPUT"
            rm -f "$RUNNER_TEMP/release.jks"
            exit 0
          }

          missing=()
          [[ -n "$RELEASE_KEYSTORE_BASE64" ]] || missing+=(RELEASE_KEYSTORE_BASE64)
          [[ -n "$RELEASE_STORE_PASSWORD" ]] || missing+=(RELEASE_STORE_PASSWORD)
          [[ -n "$RELEASE_KEY_ALIAS" ]] || missing+=(RELEASE_KEY_ALIAS)
          [[ -n "$RELEASE_KEY_PASSWORD" ]] || missing+=(RELEASE_KEY_PASSWORD)

          if (( ${#missing[@]} > 0 )); then
            skip_release "Release signing secrets are not configured: ${missing[*]}"
          fi

          if ! printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"; then
            skip_release "RELEASE_KEYSTORE_BASE64 is not valid base64"
          fi

          if [[ ! -s "$RUNNER_TEMP/release.jks" ]]; then
            skip_release "Decoded release keystore is empty"
          fi

          if ! keytool -list \
              -keystore "$RUNNER_TEMP/release.jks" \
              -storepass:env RELEASE_STORE_PASSWORD \
              -alias "$RELEASE_KEY_ALIAS" >/dev/null 2>&1; then
            skip_release "Release keystore, store password, or key alias is invalid"
          fi

          echo "can_release=true" >> "$GITHUB_OUTPUT"
          echo "RELEASE_STORE_FILE=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"

      - name: Build APK & AAB
        working-directory: ft8cn
        shell: bash
        env:
          RELEASE_SIGNING_AVAILABLE: ${{ steps.release_secrets.outputs.can_release }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          args=(assembleRelease)
          # Sign + produce AAB only on release builds — PR builds stay unsigned
          # because the keystore secret isn't available (and shouldn't be) for
          # fork PRs.
          if [[ "${RELEASE_SIGNING_AVAILABLE}" == "true" && -n "${RELEASE_STORE_FILE:-}" ]]; then
            args+=(bundleRelease \
              "-PRELEASE_STORE_FILE=$RELEASE_STORE_FILE" \
              "-PRELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD" \
              "-PRELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS" \
              "-PRELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD")
          fi
          ./gradlew "${args[@]}"

      - name: Rename APK
        if: steps.tag.outputs.should_release == 'true' && steps.release_secrets.outputs.can_release == 'true'
        run: |
          set -euo pipefail
          cd ft8cn/app/build/outputs/apk/release
          # Signed builds emit app-release.apk; unsigned emit app-release-unsigned.apk.
          # Keep the fallback so the rename works either way.
          if [[ -f app-release.apk ]]; then
            src=app-release.apk
          elif [[ -f app-release-unsigned.apk ]]; then
            src=app-release-unsigned.apk
          else
            echo "::error::No release APK found in $(pwd):" >&2
            ls -la >&2
            exit 1
          fi
          mv "$src" "FT8CN-${{ steps.tag.outputs.release_tag }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: ft8cn-release
          path: ft8cn/app/build/outputs/apk/release/*.apk

      - name: Upload AAB artifact
        if: steps.tag.outputs.should_release == 'true' && steps.release_secrets.outputs.can_release == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ft8cn-release-aab
          path: ft8cn/app/build/outputs/bundle/release/*.aab

      - name: Create GitHub Release
        if: steps.tag.outputs.should_release == 'true' && steps.release_secrets.outputs.can_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          files: ft8cn/app/build/outputs/apk/release/FT8CN-*.apk
          generate_release_notes: true
          append_body: true
          body: |

            ---
            Vibecoded with spite on I-70 enroute to Dayton Hamvention.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Play publishing secrets
        id: play_secrets
        if: steps.tag.outputs.should_release == 'true' && steps.release_secrets.outputs.can_release == 'true'
        shell: bash
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          if [[ -z "$PLAY_SERVICE_ACCOUNT_JSON" ]]; then
            echo "::notice::PLAY_SERVICE_ACCOUNT_JSON is not configured; skipping Play publishing."
            echo "can_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "can_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish AAB to Play Internal track
        if: steps.tag.outputs.should_release == 'true' && steps.release_secrets.outputs.can_release == 'true' && steps.play_secrets.outputs.can_publish == 'true' && github.event.repository.fork == false
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: radio.ks3ckc.ft8af
          releaseFiles: ft8cn/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          releaseName: ${{ steps.tag.outputs.release_tag }}
